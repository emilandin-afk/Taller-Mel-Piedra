name: Deploy agenda
on: workflow_dispatch
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download and fix agenda
        run: |
          curl -L "https://gist.githubusercontent.com/emilandin-afk/470b1e55469780d577350683ecbd985c/raw/agenda-pintura.html" -o agenda-pintura.html
          python3 - << 'PYEOF'
          with open('agenda-pintura.html', 'r', encoding='utf-8') as f:
              content = f.read()
          content = content.replace('\u2018', "'").replace('\u2019', "'")
          content = content.replace('\u201c', '"').replace('\u201d', '"')
          content = content.replace('\u2026', '...')
          with open('agenda-pintura.html', 'w', encoding='utf-8') as f:
              f.write(content)
          print('Fixed!')
          PYEOF
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add agenda-pintura.html
          git commit -m "Update agenda fixed" || echo "No changes"
          git push
