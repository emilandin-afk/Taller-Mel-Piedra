<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudio Mel Piedra</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#0d0d0d;color:#f5f2ee;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0}
h1{font-size:2.5rem;font-weight:300;font-style:italic;color:#c8a97e}
.tabs{display:flex;justify-content:center;gap:2px;margin-bottom:20px;background:rgba(10,10,10,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:4px;width:fit-content;margin-left:auto;margin-right:auto;flex-wrap:wrap}
.tbtn{font-family:Georgia,serif;font-size:0.9rem;padding:8px 20px;border:none;background:transparent;color:rgba(245,242,238,0.38);cursor:pointer;border-radius:3px}
.tbtn.active{background:rgba(200,169,126,0.32);color:#c8a97e;border:1px solid rgba(200,169,126,0.32)}
.panel{display:none}.panel.active{display:block}
.card{background:rgba(10,10,10,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:20px;margin-bottom:16px}
.card-title{font-size:1.1rem;font-weight:300;margin-bottom:14px;color:#f5f2ee}
.btn{font-family:Georgia,serif;font-size:0.9rem;padding:8px 18px;border-radius:3px;cursor:pointer;border:1px solid}
.btn-gold{background:rgba(200,169,126,0.32);color:#c8a97e;border-color:rgba(200,169,126,0.32)}
.btn-ghost{background:transparent;color:rgba(245,242,238,0.38);border-color:rgba(255,255,255,0.06)}
textarea{width:100%;min-height:70px;font-family:monospace;font-size:0.75rem;padding:10px;border:1px solid rgba(255,255,255,0.06);border-radius:3px;background:rgba(255,255,255,0.04);color:#f5f2ee;resize:vertical;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-family:monospace;font-size:0.7rem;padding:4px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);border-radius:20px;color:rgba(245,242,238,0.82);display:flex;align-items:center;gap:6px}
.chip-x{cursor:pointer;opacity:0.4}.chip-x:hover{opacity:1;color:#e07050}
.month-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.month-bar select,.month-bar input[type=number]{font-family:monospace;font-size:0.75rem;padding:7px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:3px;color:#f5f2ee}
.month-bar select option{background:#1a1a1a}
.sched-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.day-card{background:rgba(10,10,10,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
.day-hdr{padding:10px 16px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between}
.day-name{font-style:italic;color:#c8a97e;font-size:1.1rem}
.day-info{font-family:monospace;font-size:0.6rem;color:rgba(245,242,238,0.38)}
.time-lbl{font-family:monospace;font-size:0.6rem;color:#c8a97e;padding:8px 16px 4px;opacity:0.65}
.slots-list{padding:0 16px 10px;display:flex;flex-direction:column;gap:4px}
.slot-row{display:flex;align-items:center;gap:7px}
.slot-num{font-family:monospace;font-size:0.58rem;color:rgba(245,242,238,0.38);width:15px}
.slot-sel{flex:1;font-family:Georgia,serif;font-size:0.88rem;padding:5px 9px;border:1px solid rgba(255,255,255,0.07);border-radius:3px;background:rgba(255,255,255,0.04);color:rgba(245,242,238,0.82);cursor:pointer}
.slot-sel option{background:#1a1a1a}
.slot-sel.occ{border-color:rgba(200,169,126,0.22);background:rgba(200,169,126,0.06)}
.frozen-name{font-family:Georgia,serif;font-size:0.9rem;color:rgba(245,242,238,0.82);flex:1}
.frozen-empty{font-family:monospace;font-size:0.65rem;color:rgba(245,242,238,0.38);font-style:italic}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.week-lbl{font-family:monospace;font-size:0.72rem;color:#c8a97e;flex:1;text-align:center}
.week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}
.week-day-card{background:rgba(10,10,10,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
.week-slots{padding:4px 16px 12px;display:flex;flex-direction:column;gap:6px}
.week-slot-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.ws-num{font-family:monospace;font-size:0.58rem;color:rgba(245,242,238,0.38);width:15px}
.ws-name{font-family:Georgia,serif;font-size:0.9rem;color:rgba(245,242,238,0.82);flex:1}
.ws-empty{font-family:monospace;font-size:0.65rem;color:rgba(255,255,255,0.15);font-style:italic}
.att-btn{font-family:monospace;font-size:0.6rem;padding:3px 8px;border-radius:3px;cursor:pointer;border:1px solid;line-height:1.4}
.att-none{background:transparent;color:rgba(245,242,238,0.38);border-color:rgba(255,255,255,0.06)}
.att-present{background:rgba(122,158,126,0.28);color:#a8c8aa;border-color:rgba(122,158,126,0.35)}
.att-noaviso{background:rgba(192,96,80,0.25);color:#e09080;border-color:rgba(192,96,80,0.35)}
.att-aviso{background:rgba(201,164,58,0.25);color:#d4b84a;border-color:rgba(201,164,58,0.35)}
.ws-note{font-family:monospace;font-size:0.62rem;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(245,242,238,0.82);width:80px}
.att-table{width:100%;border-collapse:collapse;font-family:monospace;font-size:0.68rem}
.att-table th{padding:8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);color:#c8a97e;font-weight:300;font-size:0.6rem}
.att-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.att-name{font-family:Georgia,serif;font-size:0.9rem}
.tag{font-family:monospace;font-size:0.6rem;padding:2px 7px;border-radius:20px;border:1px solid}
.tag-p{background:rgba(122,158,126,0.28);border-color:rgba(122,158,126,0.35);color:#a8c8aa}
.tag-a{background:rgba(192,96,80,0.25);border-color:rgba(192,96,80,0.3);color:#e09080}
.tag-av{background:rgba(201,164,58,0.25);border-color:rgba(201,164,58,0.3);color:#d4b84a}
.pct-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden;min-width:60px}
.pct-fill{height:100%;border-radius:2px;background:rgba(122,158,126,1)}
.pct-fill.mid{background:rgba(201,164,58,1)}.pct-fill.low{background:rgba(192,96,80,1)}
.avail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:13px}
.avail-card{background:rgba(10,10,10,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
.avail-hdr{padding:10px 15px;background:rgba(122,158,126,0.28);border-bottom:1px solid rgba(122,158,126,0.18);display:flex;justify-content:space-between}
.avail-day{font-style:italic;color:#a8c8aa;font-size:1rem}
.avail-cnt{font-family:monospace;font-size:0.6rem;color:rgba(168,200,170,0.65)}
.avail-body{padding:11px 15px}
.avail-tlbl{font-family:monospace;font-size:0.6rem;color:rgba(122,158,126,1);margin-bottom:5px}
.avail-slots{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.avail-spot{font-family:monospace;font-size:0.64rem;padding:3px 9px;border-radius:20px;border:1px solid rgba(122,158,126,0.38);background:rgba(122,158,126,0.28);color:#a8c8aa}
.avail-full{font-size:0.83rem;color:rgba(245,242,238,0.38);font-style:italic}
.empty{text-align:center;padding:40px;color:rgba(245,242,238,0.38);font-style:italic;grid-column:1/-1}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(8,8,8,0.95);border:1px solid rgba(255,255,255,0.1);color:#c8a97e;font-family:monospace;font-size:0.7rem;padding:9px 20px;border-radius:3px;z-index:999;transition:transform 0.32s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.badge{font-family:monospace;font-size:0.68rem;padding:5px 12px;border-radius:20px;border:1px solid}
.badge-open{background:rgba(122,158,126,0.28);border-color:rgba(122,158,126,0.35);color:#a8c8aa}
.badge-frozen{background:rgba(200,169,126,0.32);border-color:rgba(200,169,126,0.32);color:#c8a97e}
.pfila{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}.pfila:last-child{border-bottom:none}
.pnombre{font-family:Georgia,serif;font-size:0.95rem;color:rgba(245,242,238,0.82);flex:1}
.psel{font-family:monospace;font-size:0.7rem;padding:5px 8px;border:1px solid rgba(255,255,255,0.06);border-radius:3px;background:rgba(255,255,255,0.06);color:#f5f2ee}
.psel option{background:#1a1a1a}
@media(max-width:600px){.tabs{width:100%}.tbtn{flex:1;padding:8px 6px;font-size:0.8rem}.sched-grid,.week-grid,.avail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header><h1>Mel Piedra</h1></header>
<nav class="tabs">
  <button class="tbtn active" onclick="switchTab('base',this)">Planilla Base</button>
  <button class="tbtn" onclick="switchTab('semana',this)">Asistencia Semanal</button>
  <button class="tbtn" onclick="switchTab('resumen',this)">Resumen Mensual</button>
  <button class="tbtn" onclick="switchTab('disponibles',this)">Disponibles</button>
  <button class="tbtn" onclick="switchTab('pagos',this)">Pagos</button>
</nav>

<div id="tab-base" class="panel active">
  <div class="card">
    <div class="card-title">Lista de alumnos</div>
    <textarea id="studentInput" placeholder="Nombre, telefono (uno por linea)&#10;Ej: Maria, 099123456"></textarea>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-gold" onclick="importStudents()">Agregar</button>
      <label class="btn btn-gold" style="cursor:pointer"><input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="importXlsx(this)">Importar Excel</label>
      <button class="btn btn-ghost" onclick="clearStudents()">Limpiar</button>
    </div>
    <div class="chips" id="studentsChips"></div>
  </div>
  <div class="month-bar">
    <select id="baseMonth" onchange="renderBase()"><option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option><option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option><option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option><option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option></select>
    <input type="number" id="baseYear" value="2026" min="2024" max="2030" onchange="renderBase()" style="width:80px">
    <span class="badge" id="monthBadge">-</span>
    <button class="btn btn-ghost" id="freezeBtn" onclick="freezeMonth()" style="margin-left:auto">Congelar</button>
    <button class="btn btn-ghost" onclick="resetMonthToDefault()">Restablecer</button>
  </div>
  <div class="sched-grid" id="baseGrid"></div>
</div>

<div id="tab-semana" class="panel">
  <div class="week-nav">
    <button class="btn btn-ghost" onclick="prevWeek()">anterior</button>
    <span class="week-lbl" id="weekLbl"></span>
    <button class="btn btn-ghost" onclick="nextWeek()">siguiente</button>
  </div>
  <div class="week-grid" id="weekGrid"></div>
</div>

<div id="tab-resumen" class="panel">
  <div class="month-bar">
    <select id="resumeMonth" onchange="renderResumen()"><option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option><option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option><option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option><option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option></select>
    <input type="number" id="resumeYear" value="2026" min="2024" max="2030" onchange="renderResumen()" style="width:80px">
  </div>
  <div class="card" id="resumenCard"><div class="empty">Selecciona un mes.</div></div>
</div>

<div id="tab-disponibles" class="panel">
  <button class="btn btn-ghost" onclick="renderDisponibles()" style="margin-bottom:16px">Actualizar</button>
  <div class="avail-grid" id="availGrid"></div>
</div>

<div id="tab-pagos" class="panel">
  <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:20px">
    <button class="btn btn-ghost" onclick="pagPrev()">Anterior</button>
    <span id="pagMesLbl" style="font-family:Georgia,serif;font-size:1.2rem;font-style:italic;color:#c8a97e;min-width:200px;text-align:center">-</span>
    <button class="btn btn-ghost" onclick="pagNext()">Siguiente</button>
  </div>
  <div class="card" id="pagosCard"><div class="empty">Selecciona un mes.</div></div>
  <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
    <button class="btn btn-gold" onclick="enviarRecordatorio()" style="flex:1;padding:12px">WhatsApp recordatorio a pendientes</button>
    <button class="btn btn-ghost" onclick="exportPagos()" style="padding:12px">Exportar pagos Excel</button>
  </div>
  <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-ghost" onclick="exportBase()" style="flex:1;padding:10px">Exportar Planilla Base</button>
    <button class="btn btn-ghost" onclick="exportAsistencia()" style="flex:1;padding:10px">Exportar Asistencia</button>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>
<script>
var SCHEDULE=[
  {id:'lunes',name:'Lunes',blocks:[{id:'lun-a',lbl:'14:30 - 17:30'},{id:'lun-b',lbl:'18:00 - 21:00'}]},
  {id:'martes',name:'Martes',blocks:[{id:'mar-a',lbl:'17:30 - 20:30'}]},
  {id:'miercoles',name:'Miercoles',blocks:[{id:'mie-a',lbl:'10:30 - 13:30'},{id:'mie-b',lbl:'18:00 - 21:00'}]},
  {id:'jueves',name:'Jueves',blocks:[{id:'jue-a',lbl:'14:30 - 17:30'},{id:'jue-b',lbl:'18:00 - 21:00'}]},
  {id:'sabado',name:'Sabado',blocks:[{id:'sab-a',lbl:'10:00 - 13:00'},{id:'sab-b',lbl:'15:00 - 18:00'}]}
];
var DOW={lunes:1,martes:2,miercoles:3,jueves:4,sabado:6};
var SLOTS=8;
var MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var students=[];
var baseOverrides={};
var frozen={};
var attendance={};
var attNotes={};
var pagMes=new Date().getMonth();
var pagAnio=new Date().getFullYear();
var pagos={};
var phones={};

function monthKey(m,y){return y+'-'+String(m+1).padStart(2,'0');}
function weekKey(mon){return 'w'+mon.toISOString().slice(0,10);}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML;}
function saveState(){}

function getSlots(mk,bid){
  if(baseOverrides[mk]&&baseOverrides[mk][bid]!==undefined)return baseOverrides[mk][bid];
  var p=Object.keys(baseOverrides).filter(function(k){return k<mk;}).sort();
  var gi=p.length;
  while(gi>0){gi--;if(baseOverrides[p[gi]][bid]!==undefined)return baseOverrides[p[gi]][bid];}
  return Array(SLOTS).fill('');
}
function getMonthBase(mk){
  var r={};
  SCHEDULE.forEach(function(d){d.blocks.forEach(function(b){r[b.id]=getSlots(mk,b.id).slice();});});
  return r;
}
function setSlot(mk,bid,idx,val){
  if(!baseOverrides[mk])baseOverrides[mk]={};
  if(!baseOverrides[mk][bid])baseOverrides[mk][bid]=getSlots(mk,bid).slice();
  baseOverrides[mk][bid][idx]=val;
  var p=Object.keys(baseOverrides).filter(function(k){return k<mk;}).sort();
  var inh=Array(SLOTS).fill('');
  var si=p.length;
  while(si>0){si--;if(baseOverrides[p[si]][bid]!==undefined){inh=baseOverrides[p[si]][bid];break;}}
  if(JSON.stringify(baseOverrides[mk][bid])===JSON.stringify(inh)){
    delete baseOverrides[mk][bid];
    if(!Object.keys(baseOverrides[mk]).length)delete baseOverrides[mk];
  }
  saveState();
}

function importStudents(){
  var raw=document.getElementById('studentInput').value.trim();
  if(!raw)return;
  var lines=raw.split('\n');
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line)continue;
    var parts=line.split(',');
    var name=parts[0].trim();
    var tel=parts.length>1?parts[1].trim().replace(/[^0-9+]/g,''):'';
    if(!name)continue;
    if(students.indexOf(name)===-1)students.push(name);
    if(tel)phones[name]=tel;
  }
  document.getElementById('studentInput').value='';
  renderChips();renderBase();
  showToast('Alumnos agregados');
}
function removeStudent(i){students.splice(i,1);renderChips();renderBase();}
function clearStudents(){if(!confirm('Limpiar?'))return;students=[];renderChips();renderBase();}
function renderChips(){
  document.getElementById('studentsChips').innerHTML=students.map(function(n,i){
    var tel=phones[n]||'';
    return '<div class="chip">'+esc(n)+(tel?' <span style="opacity:0.5">'+esc(tel)+'</span>':'')+' <span class="chip-x" onclick="removeStudent('+i+')">x</span></div>';
  }).join('');
}

function curMK(){return monthKey(+document.getElementById('baseMonth').value,+document.getElementById('baseYear').value);}
function renderBase(){
  var mk=curMK();
  var isFrozen=!!frozen[mk];
  var hasOv=!!(baseOverrides[mk]&&Object.keys(baseOverrides[mk]).length);
  document.getElementById('monthBadge').textContent=isFrozen?'Congelado':(hasOv?'Con cambios':'Base');
  document.getElementById('monthBadge').className='badge '+(isFrozen?'badge-frozen':'badge-open');
  document.getElementById('freezeBtn').textContent=isFrozen?'Descongelar':'Congelar';
  if(!students.length){document.getElementById('baseGrid').innerHTML='<div class="empty">Agrega alumnos primero.</div>';return;}
  document.getElementById('baseGrid').innerHTML=SCHEDULE.map(function(day){
    var tot=day.blocks.length*SLOTS;
    var occ=day.blocks.reduce(function(s,b){return s+getSlots(mk,b.id).filter(Boolean).length;},0);
    return '<div class="day-card"><div class="day-hdr"><span class="day-name">'+day.name+'</span><span class="day-info">'+occ+'/'+tot+'</span></div>'+
      day.blocks.map(function(b){return '<div class="time-block"><div class="time-lbl">'+b.lbl+'</div><div class="slots-list">'+
        Array.from({length:SLOTS},function(_,i){return isFrozen?renderFrozenSlot(mk,b.id,i):renderBaseSlot(mk,b.id,i);}).join('')+
        '</div></div>';}).join('')+'</div>';
  }).join('');
}
function renderBaseSlot(mk,bid,i){
  var slots=getSlots(mk,bid);var cur=slots[i];
  var taken=slots.filter(function(s,j){return s&&j!==i;});
  var avail=students.filter(function(s){return taken.indexOf(s)===-1;});
  return '<div class="slot-row"><span class="slot-num">'+(i+1)+'</span>'+
    '<select class="slot-sel'+(cur?' occ':'')+'" onchange="assignBase(\''+mk+'\',\''+bid+'\','+i+',this.value)">'+
    '<option value="">libre</option>'+
    avail.map(function(s){return '<option value="'+esc(s)+'"'+(cur===s?' selected':'')+'>'+esc(s)+'</option>';}).join('')+
    (cur&&avail.indexOf(cur)===-1?'<option value="'+esc(cur)+'" selected>'+esc(cur)+'</option>':'')+
    '</select></div>';
}
function renderFrozenSlot(mk,bid,i){
  var cur=getSlots(mk,bid)[i];
  return '<div class="slot-row"><span class="slot-num">'+(i+1)+'</span>'+(cur?'<span class="frozen-name">'+esc(cur)+'</span>':'<span class="frozen-empty">libre</span>')+'</div>';
}
function assignBase(mk,bid,i,val){
  var slots=getSlots(mk,bid);
  if(val){var al=slots.indexOf(val);if(al!==-1&&al!==i){showToast(val+' ya esta en este turno');renderBase();return;}}
  setSlot(mk,bid,i,val);renderBase();
}
function freezeMonth(){var mk=curMK();if(frozen[mk])delete frozen[mk];else frozen[mk]=true;renderBase();}
function resetMonthToDefault(){var mk=curMK();if(!baseOverrides[mk]){showToast('Sin cambios');return;}if(!confirm('Descartar?'))return;delete baseOverrides[mk];renderBase();}

var currentMonday=getMonday(new Date());
function getMonday(d){var dt=new Date(d);var day=dt.getDay();dt.setDate(dt.getDate()-day+(day===0?-6:1));dt.setHours(0,0,0,0);return dt;}
function fmtWeek(mon){var sun=new Date(mon);sun.setDate(sun.getDate()+6);var o={day:'numeric',month:'short'};return mon.toLocaleDateString('es-AR',o)+' - '+sun.toLocaleDateString('es-AR',o)+' '+mon.getFullYear();}
function prevWeek(){currentMonday=new Date(currentMonday);currentMonday.setDate(currentMonday.getDate()-7);renderWeek();}
function nextWeek(){currentMonday=new Date(currentMonday);currentMonday.setDate(currentMonday.getDate()+7);renderWeek();}
function renderWeek(){
  document.getElementById('weekLbl').textContent=fmtWeek(currentMonday);
  var wk=weekKey(currentMonday);var mk=monthKey(currentMonday.getMonth(),currentMonday.getFullYear());
  var bdata=getMonthBase(mk);
  if(!attendance[wk])attendance[wk]={};if(!attNotes[wk])attNotes[wk]={};
  SCHEDULE.forEach(function(d){d.blocks.forEach(function(b){if(!attendance[wk][b.id])attendance[wk][b.id]=Array(SLOTS).fill('');if(!attNotes[wk][b.id])attNotes[wk][b.id]=Array(SLOTS).fill('');});});
  document.getElementById('weekGrid').innerHTML=SCHEDULE.map(function(day){
    var dow=DOW[day.id];var dd=new Date(currentMonday);var diff=dow-1;if(dow===6)diff=5;dd.setDate(dd.getDate()+diff);
    var ds=dd.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
    return '<div class="week-day-card"><div class="day-hdr"><span class="day-name">'+day.name+'</span><span class="day-info">'+ds+'</span></div>'+
      day.blocks.map(function(b){return '<div class="time-block"><div class="time-lbl">'+b.lbl+'</div><div class="week-slots">'+
        Array.from({length:SLOTS},function(_,i){return renderWeekSlot(wk,b.id,i,bdata);}).join('')+'</div></div>';}).join('')+'</div>';
  }).join('');
}
function renderWeekSlot(wk,bid,i,bdata){
  var bn=bdata[bid]?bdata[bid][i]:'';
  var st=attendance[wk][bid]?attendance[wk][bid][i]||'':'';
  var note=attNotes[wk][bid]?attNotes[wk][bid][i]||'':'';
  if(!bn)return '<div class="week-slot-row"><span class="ws-num">'+(i+1)+'</span><span class="ws-empty">libre</span></div>';
  var btns=[{k:'',l:'-',c:'att-none'},{k:'present',l:'OK',c:'att-present'},{k:'noaviso',l:'X',c:'att-noaviso'},{k:'aviso',l:'~',c:'att-aviso'}];
  return '<div class="week-slot-row"><span class="ws-num">'+(i+1)+'</span><span class="ws-name">'+esc(bn)+'</span>'+
    btns.map(function(b){return '<button class="att-btn '+(st===b.k?b.c:'att-none')+'" onclick="setAtt(\''+wk+'\',\''+bid+'\','+i+',\''+b.k+'\')">'+b.l+'</button>';}).join('')+
    '<input class="ws-note" value="'+esc(note)+'" placeholder="nota" onchange="setNote(\''+wk+'\',\''+bid+'\','+i+',this.value)"></div>';
}
function setAtt(wk,bid,i,val){if(!attendance[wk])attendance[wk]={};if(!attendance[wk][bid])attendance[wk][bid]=Array(SLOTS).fill('');attendance[wk][bid][i]=val;renderWeek();}
function setNote(wk,bid,i,val){if(!attNotes[wk])attNotes[wk]={};if(!attNotes[wk][bid])attNotes[wk][bid]=Array(SLOTS).fill('');attNotes[wk][bid][i]=val;}

function renderResumen(){
  var m=+document.getElementById('resumeMonth').value,y=+document.getElementById('resumeYear').value,mk=monthKey(m,y);
  var first=new Date(y,m,1),last=new Date(y,m+1,0);
  var weeks=[];var mon=getMonday(first);while(mon<=last){weeks.push(new Date(mon));mon.setDate(mon.getDate()+7);}
  var tally={};
  SCHEDULE.forEach(function(day){day.blocks.forEach(function(block){
    getSlots(mk,block.id).forEach(function(sname,si){
      if(!sname)return;if(!tally[sname])tally[sname]={present:0,noaviso:0,aviso:0,total:0};
      weeks.forEach(function(mon){
        var wk=weekKey(mon),dow=DOW[day.id],dd=new Date(mon);var diff=dow-1;if(dow===6)diff=5;dd.setDate(dd.getDate()+diff);
        if(dd.getMonth()!==m||dd.getFullYear()!==y)return;tally[sname].total++;
        var st=attendance[wk]&&attendance[wk][block.id]?attendance[wk][block.id][si]||'':'';
        if(st==='present')tally[sname].present++;else if(st==='noaviso')tally[sname].noaviso++;else if(st==='aviso')tally[sname].aviso++;
      });
    });
  });});
  var card=document.getElementById('resumenCard');
  if(!Object.keys(tally).length){card.innerHTML='<div class="empty">Sin alumnos asignados.</div>';return;}
  var rows=Object.entries(tally).sort(function(a,b){return a[0].localeCompare(b[0]);}).map(function(e){
    var name=e[0],t=e[1];var pct=t.total?Math.round(t.present/t.total*100):0;
    var cls=pct>=75?'pct-fill':'pct-fill '+(pct>=50?'mid':'low');
    return '<tr><td class="att-name">'+esc(name)+'</td><td><span class="tag tag-p">'+t.present+'</span></td><td><span class="tag tag-a">'+t.noaviso+'</span></td><td><span class="tag tag-av">'+t.aviso+'</span></td><td>'+t.total+'</td><td><div style="display:flex;align-items:center;gap:8px"><div class="pct-bar"><div class="'+cls+'" style="width:'+pct+'%"></div></div><span style="font-size:0.65rem">'+pct+'%</span></div></td></tr>';
  }).join('');
  card.innerHTML='<div style="overflow-x:auto"><table class="att-table"><thead><tr><th>Alumno</th><th>OK</th><th>Falta</th><th>Aviso</th><th>Clases</th><th>Asistencia</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderDisponibles(){
  var mk=curMK();
  document.getElementById('availGrid').innerHTML=SCHEDULE.map(function(day){
    var free=0;
    var bh=day.blocks.map(function(b){
      var fs=getSlots(mk,b.id).map(function(s,i){return s?null:i+1;}).filter(Boolean);free+=fs.length;
      if(!fs.length)return '<div style="margin-bottom:8px"><div class="avail-tlbl">'+b.lbl+'</div><p class="avail-full">Completo</p></div>';
      return '<div style="margin-bottom:8px"><div class="avail-tlbl">'+b.lbl+'</div><div class="avail-slots">'+fs.map(function(n){return '<span class="avail-spot">lugar '+n+'</span>';}).join('')+'</div></div>';
    }).join('');
    return '<div class="avail-card"><div class="avail-hdr"><span class="avail-day">'+day.name+'</span><span class="avail-cnt">'+free+'</span></div><div class="avail-body">'+bh+'</div></div>';
  }).join('');
}

function pagPrev(){pagMes--;if(pagMes<0){pagMes=11;pagAnio--;}renderPagos();}
function pagNext(){pagMes++;if(pagMes>11){pagMes=0;pagAnio++;}renderPagos();}
function getPagosLista(mk){
  var seen={};
  SCHEDULE.forEach(function(day){day.blocks.forEach(function(b){getSlots(mk,b.id).forEach(function(s){if(s)seen[s]=true;});});});
  var lista=Object.keys(seen).sort();
  if(lista.length===0){for(var i=0;i<students.length;i++)lista.push(students[i]);}
  return lista;
}
function renderPagos(){
  document.getElementById('pagMesLbl').textContent=MESES[pagMes]+' '+pagAnio;
  var mk=monthKey(pagMes,pagAnio);
  if(!pagos[mk])pagos[mk]={};
  var lista=getPagosLista(mk);
  var card=document.getElementById('pagosCard');
  if(!lista.length){card.innerHTML='<div class="empty">Sin alumnos.</div>';return;}
  var nPag=0,nPend=0,total=0;
  for(var i=0;i<lista.length;i++){
    var p=pagos[mk][lista[i]];
    if(p&&p.e==='pagado'){nPag++;total+=parseInt(p.m)||0;}
    else nPend++;
  }
  var html='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">'+
    '<div style="flex:1;min-width:100px;text-align:center;padding:12px;background:rgba(122,158,126,0.15);border:1px solid rgba(122,158,126,0.3);border-radius:4px"><div style="font-size:1.8rem;color:#a8c8aa">'+nPag+'</div><div style="font-family:monospace;font-size:0.6rem;color:rgba(245,242,238,0.38)">PAGARON</div></div>'+
    '<div style="flex:1;min-width:100px;text-align:center;padding:12px;background:rgba(192,96,80,0.15);border:1px solid rgba(192,96,80,0.3);border-radius:4px"><div style="font-size:1.8rem;color:#e09080">'+nPend+'</div><div style="font-family:monospace;font-size:0.6rem;color:rgba(245,242,238,0.38)">PENDIENTES</div></div>'+
    '<div style="flex:1;min-width:100px;text-align:center;padding:12px;background:rgba(200,169,126,0.15);border:1px solid rgba(200,169,126,0.3);border-radius:4px"><div style="font-size:1.8rem;color:#c8a97e">$'+total.toLocaleString('es-AR')+'</div><div style="font-family:monospace;font-size:0.6rem;color:rgba(245,242,238,0.38)">TOTAL</div></div>'+
  '</div>';
  html+='<div class="card-title">'+lista.length+' alumnos - '+MESES[pagMes]+' '+pagAnio+'</div>';
  for(var i=0;i<lista.length;i++){
    var n=lista[i];
    var p=pagos[mk][n]||{e:'pendiente',m:'2500'};
    var tel=phones[n]||'';
    html+='<div class="pfila">'+
      '<span class="pnombre">'+esc(n)+'</span>'+
      '<select id="pe'+i+'" class="psel" onchange="cambioPago('+i+')">'+
        '<option value="pendiente"'+(p.e!=='pagado'?' selected':'')+'>Pendiente</option>'+
        '<option value="pagado"'+(p.e==='pagado'?' selected':'')+'>Pagado</option>'+
      '</select>'+
      '<select id="pm'+i+'" class="psel" onchange="cambioPago('+i+')">'+
        '<option value="2500"'+(p.m==='2500'?' selected':'')+'>$2.500</option>'+
        '<option value="2800"'+(p.m==='2800'?' selected':'')+'>$2.800</option>'+
        '<option value="3000"'+(p.m==='3000'?' selected':'')+'>$3.000</option>'+
        '<option value="otro"'+(p.m!=='2500'&&p.m!=='2800'&&p.m!=='3000'?' selected':'')+'>'+
          (p.m!=='2500'&&p.m!=='2800'&&p.m!=='3000'?'$'+parseInt(p.m).toLocaleString('es-AR'):'Otro...')+'</option>'+
      '</select>'+
      '<input id="pmi'+i+'" class="psel" type="number" placeholder="monto" style="width:80px;display:none" onchange="montoManual('+i+')" onblur="montoManual('+i+')">'+
      (tel?'<span style="font-family:monospace;font-size:0.6rem;color:rgba(245,242,238,0.38)">'+esc(tel)+'</span>':'')+
    '</div>';
  }
  card.innerHTML=html;
}
function cambioPago(i){
  var mk=monthKey(pagMes,pagAnio);
  var lista=getPagosLista(mk);
  var n=lista[i];
  if(!pagos[mk])pagos[mk]={};
  var eEl=document.getElementById('pe'+i);
  var mEl=document.getElementById('pm'+i);
  var monto=mEl.value;
  if(monto==='otro'){
    var inp=document.getElementById('pmi'+i);
    if(inp){inp.style.display='inline-block';inp.focus();return;}
    return;
  }
  pagos[mk][n]={e:eEl.value,m:monto};
  renderPagos();
}
function montoManual(i){
  var mk=monthKey(pagMes,pagAnio);
  var lista=getPagosLista(mk);
  var n=lista[i];
  var inp=document.getElementById('pmi'+i);
  var val=inp.value.replace(/[^0-9]/g,'');
  if(!val){renderPagos();return;}
  if(!pagos[mk])pagos[mk]={};
  var eEl=document.getElementById('pe'+i);
  pagos[mk][n]={e:eEl?eEl.value:'pendiente',m:val};
  renderPagos();
}

function enviarRecordatorio(){
  var mk=monthKey(pagMes,pagAnio);
  var lista=getPagosLista(mk);
  var msg='Hola! Este es un mensaje recordatorio de tu pago pendiente del mes de '+MESES[pagMes]+' '+pagAnio+'. Gracias!';
  var encoded=encodeURIComponent(msg);
  var count=0;
  var sinTel=[];
  for(var i=0;i<lista.length;i++){
    var n=lista[i];
    var p=pagos[mk]&&pagos[mk][n];
    if(p&&p.e==='pagado')continue;
    var tel=(phones[n]||'').replace(/[^0-9]/g,'');
    if(!tel){sinTel.push(n);continue;}
    if(tel.length<=9)tel='598'+tel;
    var delay=count*1200;
    count++;
    (function(t){setTimeout(function(){window.open('https://wa.me/'+t+'?text='+encoded,'_blank');},delay);})(tel);
  }
  if(sinTel.length>0)showToast(sinTel.length+' sin telefono');
  else if(count>0)showToast('Enviando a '+count+' alumnos');
  else showToast('Todos pagaron!');
}


function loadXLSX(cb){
  if(typeof XLSX!=='undefined'){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb;
  s.onerror=function(){showToast('Error cargando Excel');};
  document.head.appendChild(s);
}
function importXlsx(input){
  var file=input.files[0];if(!file)return;
  loadXLSX(function(){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
        var added=0;
        for(var r=0;r<rows.length;r++){
          var row=rows[r];
          var name='',tel='';
          for(var c=0;c<row.length;c++){
            var v=String(row[c]).trim();
            if(!v||v.length<2)continue;
            if(!isNaN(v.replace(/[^0-9]/g,''))&&v.length>=6){tel=v.replace(/[^0-9+]/g,'');}
            else if(!name){name=v;}
          }
          if(!name)continue;
          if(students.indexOf(name)===-1){students.push(name);added++;}
          if(tel)phones[name]=tel;
        }
        renderChips();renderBase();
        showToast(added+' alumnos importados');
        input.value='';
      }catch(err){showToast('Error al leer archivo');}
    };
    reader.readAsArrayBuffer(file);
  });
}
function exportPagos(){
  loadXLSX(function(){
    var mk=monthKey(pagMes,pagAnio);
    var lista=getPagosLista(mk);
    var data=[['Alumno','Estado','Monto','Telefono']];
    for(var i=0;i<lista.length;i++){
      var n=lista[i];
      var p=pagos[mk]&&pagos[mk][n]||{e:'pendiente',m:'2500'};
      data.push([n,p.e==='pagado'?'Pagado':'Pendiente','$'+p.m,phones[n]||'']);
    }
    var ws=XLSX.utils.aoa_to_sheet(data);
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Pagos '+MESES[pagMes]+' '+pagAnio);
    XLSX.writeFile(wb,'pagos_'+MESES[pagMes]+'_'+pagAnio+'.xlsx');
  });
}
function exportBase(){
  loadXLSX(function(){
    var mk=curMK();
    var data=[['Dia','Turno','Lugar','Alumno']];
    SCHEDULE.forEach(function(day){
      day.blocks.forEach(function(b){
        var slots=getSlots(mk,b.id);
        for(var i=0;i<slots.length;i++){
          data.push([day.name,b.lbl,i+1,slots[i]||'libre']);
        }
      });
    });
    var ws=XLSX.utils.aoa_to_sheet(data);
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Planilla');
    XLSX.writeFile(wb,'planilla_base.xlsx');
  });
}
function exportAsistencia(){
  loadXLSX(function(){
    var m=+document.getElementById('resumeMonth').value,y=+document.getElementById('resumeYear').value,mk=monthKey(m,y);
    var first=new Date(y,m,1),last=new Date(y,m+1,0);
    var weeks=[];var mon=getMonday(first);while(mon<=last){weeks.push(new Date(mon));mon.setDate(mon.getDate()+7);}
    var tally={};
    SCHEDULE.forEach(function(day){day.blocks.forEach(function(block){
      getSlots(mk,block.id).forEach(function(sname,si){
        if(!sname)return;if(!tally[sname])tally[sname]={present:0,noaviso:0,aviso:0,total:0};
        weeks.forEach(function(mon){
          var wk=weekKey(mon),dow=DOW[day.id],dd=new Date(mon);var diff=dow-1;if(dow===6)diff=5;dd.setDate(dd.getDate()+diff);
          if(dd.getMonth()!==m||dd.getFullYear()!==y)return;tally[sname].total++;
          var st=attendance[wk]&&attendance[wk][block.id]?attendance[wk][block.id][si]||'':'';
          if(st==='present')tally[sname].present++;else if(st==='noaviso')tally[sname].noaviso++;else if(st==='aviso')tally[sname].aviso++;
        });
      });
    });});
    var data=[['Alumno','Presente','Falta','Aviso','Total','Asistencia %']];
    var names=Object.keys(tally).sort();
    for(var i=0;i<names.length;i++){
      var t=tally[names[i]];
      var pct=t.total?Math.round(t.present/t.total*100):0;
      data.push([names[i],t.present,t.noaviso,t.aviso,t.total,pct+'%']);
    }
    var ws=XLSX.utils.aoa_to_sheet(data);
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Asistencia '+MESES[m]+' '+y);
    XLSX.writeFile(wb,'asistencia_'+MESES[m]+'_'+y+'.xlsx');
  });
}
function switchTab(tab,btn){
  var panels=document.querySelectorAll('.panel');for(var i=0;i<panels.length;i++)panels[i].classList.remove('active');
  var btns=document.querySelectorAll('.tbtn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  document.getElementById('tab-'+tab).classList.add('active');btn.classList.add('active');
  if(tab==='semana')renderWeek();
  if(tab==='resumen')renderResumen();
  if(tab==='disponibles')renderDisponibles();
  if(tab==='pagos')renderPagos();
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2300);}

var now=new Date();
document.getElementById('baseMonth').value=now.getMonth();
document.getElementById('baseYear').value=now.getFullYear();
document.getElementById('resumeMonth').value=now.getMonth();
document.getElementById('resumeYear').value=now.getFullYear();
pagMes=now.getMonth();
pagAnio=now.getFullYear();
renderChips();
renderBase();
</script>
